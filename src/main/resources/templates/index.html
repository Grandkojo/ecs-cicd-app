<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECS CI/CD Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 48px 56px;
      text-align: center;
      max-width: 520px;
      width: 90%;
    }
    .badge {
      display: inline-block;
      background: #FF9900;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 { font-size: 2rem; color: #232F3E; margin-bottom: 8px; }
    h2 { font-size: 1.15rem; color: #555; font-weight: 400; margin-bottom: 28px; }
    .tech {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .tech span {
      background: #f0f2f5;
      color: #232F3E;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">AWS Fargate · ECS CI/CD</div>
    <h1>Ernest Kojo Owusu Essien</h1>
    <h2>Lab: ECS CI/CD</h2>
    <div class="tech">
      <span>CodeDeploy Blue/Green</span>
      <span>GitHub Actions OIDC</span>
      <span>CloudFormation GitSync</span>
      <span>Amazon ECR</span>
    </div>
  </div>
</body>
</html>
